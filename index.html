<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Survey - Binary & Beyond Research</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 700px;
      width: 100%;
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 30px;
      text-align: center;
    }

    .header h1 {
      font-size: 28px;
      margin-bottom: 10px;
    }

    .header p {
      font-size: 14px;
      opacity: 0.9;
    }

    .content {
      padding: 40px;
    }

    .info-box {
      background: #f0f4ff;
      border-left: 4px solid #667eea;
      padding: 15px;
      margin-bottom: 30px;
      border-radius: 4px;
    }

    .info-box p {
      margin: 5px 0;
      font-size: 13px;
      color: #555;
      word-break: break-all;
    }

    .info-box strong {
      color: #333;
    }

    .question {
      margin-bottom: 30px;
    }

    .question label {
      display: block;
      font-weight: 600;
      margin-bottom: 10px;
      color: #333;
      font-size: 16px;
    }

    .question select {
      width: 100%;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 6px;
      font-size: 14px;
      transition: border-color 0.3s;
    }

    .question select:focus {
      outline: none;
      border-color: #667eea;
    }

    .radio-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .radio-group label {
      display: flex;
      align-items: center;
      font-weight: normal;
      cursor: pointer;
      padding: 10px;
      border-radius: 6px;
      transition: background 0.2s;
    }

    .radio-group label:hover {
      background: #f5f5f5;
    }

    .radio-group input[type="radio"] {
      margin-right: 10px;
      width: 18px;
      height: 18px;
      cursor: pointer;
    }

    .submit-btn {
      width: 100%;
      padding: 15px 25px;
      font-size: 16px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s;
      text-align: center;
      color: white;
      background: linear-gradient(135deg, #667eea, #764ba2);
      margin-top: 30px;
    }

    .submit-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
    }

    .submit-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .error {
      background: #ffebee;
      color: #c62828;
      padding: 15px;
      border-radius: 6px;
      margin-bottom: 20px;
      border-left: 4px solid #c62828;
    }

    .footer {
      text-align: center;
      padding: 20px;
      background: #f9f9f9;
      color: #666;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📋 Test Survey</h1>
      <p>Binary & Beyond Research - Survey Redirect System Testing</p>
    </div>

    <div class="content">
      <div class="info-box" id="info-box">
        <p><strong>Tracking ID:</strong> <span id="tracking-id">Not provided</span></p>
        <p><strong>Return URL:</strong> <span id="return-url">Not provided</span></p>
        <p><strong>User ID:</strong> <span id="user-id">Not provided</span></p>
      </div>

      <div id="error-message" class="error" style="display: none;">
        ⚠️ Missing required parameters. Make sure you access this page via the entry URL.
      </div>

      <form id="survey-form">
        <div class="question">
          <label for="age">1. What is your age?</label>
          <select id="age" required>
            <option value="">Select age group</option>
            <option value="18-24">18-24</option>
            <option value="25-34">25-34</option>
            <option value="36-45">36-45</option>
            <option value="46-60">46-60</option>
            <option value="60+">60+</option>
          </select>
        </div>

        <div class="question">
          <label>2. Do you regularly use toothpaste?</label>
          <div class="radio-group">
            <label>
              <input type="radio" name="uses_toothpaste" value="yes" required>
              Yes
            </label>
            <label>
              <input type="radio" name="uses_toothpaste" value="no">
              No (Will terminate)
            </label>
          </div>
        </div>

        <div class="question">
          <label>3. Which toothpaste brand do you currently use?</label>
          <div class="radio-group">
            <label>
              <input type="radio" name="brand" value="colgate">
              Colgate
            </label>
            <label>
              <input type="radio" name="brand" value="crest">
              Crest
            </label>
            <label>
              <input type="radio" name="brand" value="sensodyne">
              Sensodyne
            </label>
            <label>
              <input type="radio" name="brand" value="other">
              Other
            </label>
          </div>
        </div>

        <div class="question">
          <label>4. How satisfied are you with your current toothpaste?</label>
          <div class="radio-group">
            <label>
              <input type="radio" name="satisfaction" value="very-satisfied">
              Very Satisfied
            </label>
            <label>
              <input type="radio" name="satisfaction" value="satisfied">
              Satisfied
            </label>
            <label>
              <input type="radio" name="satisfaction" value="neutral">
              Neutral
            </label>
            <label>
              <input type="radio" name="satisfaction" value="dissatisfied">
              Dissatisfied
            </label>
          </div>
        </div>

        <button type="submit" class="submit-btn">
          Submit Survey
        </button>
      </form>
    </div>

    <div class="footer">
      &copy; 2026 Binary & Beyond Research | Test Survey Page
    </div>
  </div>

  <script>
    // Parse URL parameters
    const urlParams = new URLSearchParams(window.location.search);
    const trackingId = urlParams.get('tracking_id');
    const returnUrl = urlParams.get('return_url');
    const userId = urlParams.get('user_id');

    // Display parameters
    document.getElementById('tracking-id').textContent = trackingId || 'Not provided';
    document.getElementById('return-url').textContent = returnUrl || 'Not provided';
    document.getElementById('user-id').textContent = userId || 'Not provided';

    // Show error if missing parameters
    if (!trackingId || !returnUrl) {
      document.getElementById('error-message').style.display = 'block';
    }

    // Simulate quota tracking (in real app, this comes from backend)
    const ageQuotas = {
      '18-24': 2,  // Max 2 for testing - set to 2 to test quota full
      '25-34': 100,
      '36-45': 100,
      '46-60': 100,
      '60+': 100
    };

    // Simulate current counts (in real app, fetched from backend)
    const ageQuotaCounts = {
      '18-24': 2,  // Already full! Will trigger quota full
      '25-34': 50,
      '36-45': 30,
      '46-60': 20,
      '60+': 10
    };

    // Handle form submission
    document.getElementById('survey-form').addEventListener('submit', function(e) {
      e.preventDefault();

      if (!trackingId || !returnUrl) {
        alert('⚠️ Cannot submit: Missing tracking_id or return_url\n\nPlease access via the entry URL.');
        return;
      }

      // Get form values
      const age = document.getElementById('age').value;
      const usesToothpaste = document.querySelector('input[name="uses_toothpaste"]:checked');

      // Validation
      if (!age) {
        alert('Please select your age');
        return;
      }

      if (!usesToothpaste) {
        alert('Please answer if you use toothpaste');
        return;
      }

      // Logic 1: TERMINATE - Doesn't use toothpaste
      if (usesToothpaste.value === 'no') {
        console.log('User terminated: Does not use toothpaste');
        exitSurvey(2); // status=2 = Terminate
        return;
      }

      // Logic 2: QUOTA FULL - Age group quota reached
      if (ageQuotaCounts[age] >= ageQuotas[age]) {
        console.log('Quota full for age group:', age);
        exitSurvey(3); // status=3 = Quota Full
        return;
      }

      // Logic 3: COMPLETE - All checks passed!
      console.log('Survey completed successfully');
      exitSurvey(1); // status=1 = Complete
    });

    function exitSurvey(status) {
      const statusNames = {
        1: 'Complete',
        2: 'Terminate',
        3: 'Quota Full',
        4: 'Security'
      };

      console.log(`Exiting with status: ${status} (${statusNames[status]})`);

      // Build exit URL
      const exitUrl = `${returnUrl}?status=${status}&tracking_id=${trackingId}`;

      console.log('Redirecting to:', exitUrl);

      // Redirect to exit callback
      window.location.href = exitUrl;
    }

    // Log parameters on load
    console.log('=== Test Survey Loaded ===');
    console.log('Tracking ID:', trackingId);
    console.log('Return URL:', returnUrl);
    console.log('User ID:', userId);
    console.log('========================');
  </script>
</body>
</html>
